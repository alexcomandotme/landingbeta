<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>alexcoman.me</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    background: transparent;
    font-family: 'JetBrains Mono', monospace;
    padding: 2rem;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    transition: opacity 0.4s ease;
  }
  body.fade-out { opacity: 0; }

  .term-header {
    font-size: 15px;
    color: rgba(255,255,255,0.35);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-bottom: 2rem;
    font-weight: 700;
  }

  .stack-badge {
    position: fixed;
    top: 1.5rem;
    right: 1.5rem;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    font-weight: 700;
    color: rgba(255,255,255,0.2);
    line-height: 1.6;
    text-align: right;
    pointer-events: none;
  }

  .term-output {
    font-size: 15px;
    color: rgba(255,255,255,0.6);
    line-height: 2;
    font-weight: 700;
    overflow-y: auto;
    max-height: 70vh;
  }

  .term-output .line { display: block; white-space: pre-wrap; word-break: break-word; }
  .term-output .dim    { color: rgba(255,255,255,0.3); }
  .term-output .bright { color: #fff; }
  .term-output .ok     { color: #1D9E75; }
  .term-output .err    { color: #E24B4A; }
  .term-output .ai     { color: #5DCAA5; }

  .term-output .line.fade-in {
    opacity: 0;
    animation: fadeIn 0.4s ease forwards;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(2px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .ai-link {
    color: #5DCAA5;
    cursor: pointer;
    display: block;
    text-decoration: none;
  }
  .ai-link:hover { text-decoration: underline; }

  .term-input-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-top: 1.5rem;
    border-top: 0.5px solid rgba(255,255,255,0.12);
    padding-top: 1.5rem;
  }
  .term-prompt {
    font-size: 15px;
    color: rgba(255,255,255,0.3);
    white-space: nowrap;
    font-weight: 700;
  }
  #term-input {
    background: transparent;
    border: none;
    outline: none;
    font-family: 'JetBrains Mono', monospace;
    font-size: 15px;
    font-weight: 700;
    color: #fff;
    flex: 1;
    caret-color: #fff;
  }
  #term-input::placeholder {
    color: rgba(255,255,255,0.5);
    font-weight: 700;
  }

  @media (max-width: 640px) {
    body { padding: 1.5rem 1.25rem; }
    .term-output { font-size: 14px; max-height: 65vh; }
    .term-prompt  { font-size: 14px; }
    #term-input   { font-size: 16px; }
    .stack-badge  { font-size: 10px; top: 1rem; right: 1rem; }
  }
</style>
</head>
<body>

<div class="term-header">alexcoman.me</div>

<div class="term-output" id="output">
  <span class="line">operations, systems. you're at the surface.</span>
  <span class="line dim">there's more underneath.</span>
  <span class="line">&nbsp;</span>
  <span class="line dim">→ the work  → the approach  → work with alex</span>
</div>

<div class="term-input-row">
  <span class="term-prompt">alex@coman ~ %</span>
  <input id="term-input" autocomplete="off" autocorrect="off" spellcheck="false" autofocus placeholder="type a command..." />
</div>

<div class="stack-badge">
  groq + llama-3.3-70b · next.js · vercel<br>built by alex.
</div>

<script>
const config = {
  desktopUrl: 'https://alexcoman.me/desktop',
  apiUrl: '/api/ask',
  email: 'hi@alexcoman.me',
  redirectCommands: ['open desktop', 'cd desktop', 'cd /desktop', 'desktop'],
  contactKeywords: ['contact', 'email', 'reach', 'mail', 'get in touch', 'hire', 'work with'],
  birthDate: '1990-08-19T09:30:00Z'
};

const state = { intent: 'casual', score: 0, stage: 0, linksShown: [] };
const aiHistory = [], cmdHistory = [];
let cmdHistoryIdx = -1, uptimeInterval = null;
const input = document.getElementById('term-input');
const output = document.getElementById('output');

window.addEventListener('load',  () => input.focus());
window.addEventListener('focus', () => input.focus());
document.addEventListener('click', () => input.focus());

function addLine(text, cls) {
  const span = document.createElement('span');
  span.className = 'line ' + (cls || '');
  span.textContent = text;
  output.appendChild(span);
  output.scrollTop = output.scrollHeight;
  return span;
}

function addLines(lines) {
  lines.forEach(l => addLine(l.text, l.cls || ''));
  addLine('');
}

function addFadeLine(text, cls, delay = 0) {
  const span = document.createElement('span');
  span.className = 'line fade-in ' + (cls || 'ai');
  span.style.animationDelay = delay + 'ms';
  span.textContent = text;
  output.appendChild(span);
  output.scrollTop = output.scrollHeight;
  return span;
}

function fadeAndRedirect(url) {
  document.body.classList.add('fade-out');
  setTimeout(() => {
    try { window.top.location.href = url; } catch (e) { window.location.href = url; }
  }, 450);
}

function openInNewTab(url) {
  window.open(url, '_blank', 'noopener,noreferrer');
}

function copyToClipboard(text) {
  if (navigator.clipboard && window.isSecureContext) return navigator.clipboard.writeText(text);
  return new Promise((resolve, reject) => {
    const ta = document.createElement('textarea');
    ta.value = text;
    ta.style.cssText = 'position:fixed;opacity:0;left:-9999px';
    document.body.appendChild(ta);
    ta.focus(); ta.select();
    try { document.execCommand('copy') ? resolve() : reject(); }
    catch (e) { reject(e); }
    finally { document.body.removeChild(ta); }
  });
}

function addEmailBlock() {
  const emailLine = document.createElement('div');
  emailLine.className = 'line';
  emailLine.style.color = '#5DCAA5';
  emailLine.style.cursor = 'pointer';
  emailLine.style.userSelect = 'text';
  const [user, domain] = config.email.split('@');
  const status = document.createElement('span');
  status.textContent = '  [click to copy]';
  status.style.color = 'rgba(255,255,255,0.4)';
  const prefix = document.createElement('span'); prefix.textContent = '> ';
  const uSpan  = document.createElement('span'); uSpan.textContent = user + '\u200B';
  const at     = document.createElement('span'); at.textContent = '@';
  const dSpan  = document.createElement('span'); dSpan.textContent = domain;
  emailLine.append(prefix, uSpan, at, dSpan, status);
  emailLine.addEventListener('click', e => {
    e.preventDefault(); e.stopPropagation();
    copyToClipboard(config.email)
      .then(() => { status.textContent = '  [copied]'; setTimeout(() => { status.textContent = '  [click to copy]'; }, 1500); })
      .catch(() => { status.textContent = '  [select & copy manually]'; });
  });
  output.appendChild(emailLine);
  const gmailLink = document.createElement('a');
  gmailLink.href = 'https://mail.google.com/mail/?view=cm&fs=1&to=' + encodeURIComponent(config.email);
  gmailLink.target = '_blank';
  gmailLink.rel = 'noopener noreferrer';
  gmailLink.textContent = '> open in gmail';
  gmailLink.className = 'line';
  gmailLink.style.color = 'rgba(255,255,255,0.4)';
  output.appendChild(gmailLink);
  output.scrollTop = output.scrollHeight;
}

function clearUptime() {
  if (uptimeInterval) { clearInterval(uptimeInterval); uptimeInterval = null; }
}

function getUptime() {
  const diff = new Date() - new Date(config.birthDate);
  const y = Math.floor(diff / (1000*60*60*24*365.25));
  const d = Math.floor((diff % (1000*60*60*24*365.25)) / (1000*60*60*24));
  const h = Math.floor((diff % (1000*60*60*24)) / (1000*60*60));
  const m = Math.floor((diff % (1000*60*60)) / (1000*60));
  const s = Math.floor((diff % (1000*60)) / 1000);
  return `${y}y ${d}d ${h}h ${m}m ${s}s`;
}

function showThinkingDots() {
  const span = document.createElement('span');
  span.className = 'line dim';
  span.textContent = '>';
  output.appendChild(span);
  output.scrollTop = output.scrollHeight;
  let dots = 0;
  const interval = setInterval(() => {
    dots = (dots + 1) % 4;
    span.textContent = '>' + '.'.repeat(dots);
  }, 300);
  return { element: span, stop: () => clearInterval(interval) };
}

function updateIntent(q) {
  const text = q.toLowerCase();
  const recruiterWords = ['job', 'hire', 'cv', 'linkedin', 'available', 'role', 'salary', 'rate', 'freelance'];
  const evalWords      = ['work', 'experience', 'delivery', 'implementation', 'system', 'arla', 'anomaly', 'operations'];
  recruiterWords.forEach(w => { if (text.includes(w)) state.score += 40; });
  evalWords.forEach(w      => { if (text.includes(w)) state.score += 20; });
  if (state.score > 80)      state.intent = 'recruiter';
  else if (state.score > 30) state.intent = 'evaluation';
  else                       state.intent = 'casual';
}

const commands = {
  help: () => addLines([
    { text: 'available commands:', cls: 'dim' },
    { text: '  whoami' },
    { text: '  uptime' },
    { text: '  readme' },
    { text: '  clear' }
  ]),
  readme: () => addLines([
    { text: 'this is the surface.' },
    { text: 'the work lives somewhere else.' },
    { text: 'https://linkedin.com/in/alexcoman', cls: 'ok' }
  ]),
  clear: () => { output.innerHTML = ''; addLine(''); },
  cls: () => commands.clear(),
  whoami: () => addLines([
    { text: 'systems for a living. photography and film for everything else.' },
    { text: 'alexcoman.me/stillhere', cls: 'ai' },
    { text: 'alexcoman.me/werken-film', cls: 'ai' }
  ]),
  uptime: () => {
    clearUptime();
    const span = document.createElement('span');
    span.className = 'line bright';
    span.textContent = getUptime();
    output.appendChild(span);
    addLine('load average: variable', 'dim');
    addLine('');
    uptimeInterval = setInterval(() => { span.textContent = getUptime(); }, 1000);
  }
};

function isContactIntent(q) {
  return config.contactKeywords.some(k => q.toLowerCase().includes(k));
}

function handleContact() {
  addLine('reach out:', 'ai');
  addEmailBlock();
  addLine('');
}

async function askAI(query) {
  const thinking = showThinkingDots();
  aiHistory.push({ role: 'user', content: query });

  try {
    const res = await fetch(config.apiUrl, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        query,
        history:    aiHistory.slice(-6),
        isMobile:   window.innerWidth < 768,
        linksShown: state.linksShown,
        intent:     state.intent,
        score:      state.score,
        stage:      state.stage
      })
    });

    const data = await res.json();
    const text = data.text;

    thinking.stop();
    thinking.element.remove();

    if (!text) { addLine('no response.', 'err'); addLine(''); return; }

    aiHistory.push({ role: 'assistant', content: text });
    if (aiHistory.length > 12) aiHistory.splice(0, 2);

    const lines = text.split('\n');
    let delay = 0;

    lines.forEach(l => {
      const trimmed = l.trim();
      if (!trimmed) {
        addFadeLine('\u00A0', 'dim', delay);
        delay += 80;
        return;
      }

      const urlMatch = trimmed.match(/(?:https?:\/\/)?alexcoman\.me\/[a-z0-9\-]+/i)
                    || trimmed.match(/^https?:\/\/\S+/);

      if (urlMatch) {
        const raw = urlMatch[0];
        const fullUrl = raw.startsWith('http') ? raw : 'https://' + raw;
        if (!state.linksShown.includes(fullUrl)) state.linksShown.push(fullUrl);
        const a = document.createElement('a');
        a.href = fullUrl;
        a.textContent = raw;
        a.className = 'line fade-in ai-link';
        a.style.animationDelay = delay + 'ms';
        a.target = '_blank';
        a.rel = 'noopener noreferrer';
        a.addEventListener('click', e => { e.preventDefault(); openInNewTab(fullUrl); });
        output.appendChild(a);
        output.scrollTop = output.scrollHeight;
        delay += 80;
      } else if (trimmed.match(/^[\w.]+@[\w.]+\.\w+$/)) {
        const a = document.createElement('a');
        a.href = 'mailto:' + trimmed;
        a.textContent = trimmed;
        a.style.color = '#5DCAA5';
        a.style.display = 'block';
        a.className = 'line fade-in';
        a.style.animationDelay = delay + 'ms';
        a.target = '_top';
        output.appendChild(a);
        output.scrollTop = output.scrollHeight;
        delay += 80;
      } else {
        addFadeLine(trimmed, 'ai', delay);
        delay += 80;
      }
    });

    setTimeout(() => { addLine(''); }, delay + 100);

  } catch (e) {
    thinking.stop();
    thinking.element.remove();
    addLine('connection failed.', 'err');
    addLine('');
  }
}

input.addEventListener('keydown', e => {
  if (e.key === 'ArrowUp') {
    e.preventDefault();
    if (!cmdHistory.length) return;
    if (cmdHistoryIdx === -1) cmdHistoryIdx = cmdHistory.length;
    cmdHistoryIdx = Math.max(0, cmdHistoryIdx - 1);
    input.value = cmdHistory[cmdHistoryIdx] || '';
    return;
  }
  if (e.key === 'ArrowDown') {
    e.preventDefault();
    if (!cmdHistory.length || cmdHistoryIdx === -1) return;
    cmdHistoryIdx++;
    if (cmdHistoryIdx >= cmdHistory.length) { cmdHistoryIdx = -1; input.value = ''; }
    else input.value = cmdHistory[cmdHistoryIdx];
    return;
  }

  if (e.key !== 'Enter') return;

  const val      = input.value.trim();
  const valLower = val.toLowerCase();
  if (!val) return;

  cmdHistory.push(val);
  cmdHistoryIdx = -1;

  addLine('alex@coman ~ % ' + val, 'dim');
  input.value = '';

  if (valLower !== 'uptime') clearUptime();

  if (config.redirectCommands.includes(valLower)) {
    addLine('unlocking /desktop...', 'dim');
    addLine('redirecting.', 'ok');
    setTimeout(() => fadeAndRedirect(config.desktopUrl), 800);
    return;
  }

  if (commands[valLower]) { commands[valLower](); return; }
  if (isContactIntent(val)) { handleContact(); return; }

  updateIntent(val);
  askAI(val);
});
</script>
</body>
</html>
